<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Submit Sealed Bid</title>
    <link rel="icon" href="/app/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/app/site.css" />
    <script src="/app/wallet.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar"><a class="brand" href="/app"><span class="brand-mark">B</span><span>Submit Bid</span></a><nav class="nav-links"><a href="/app/pages/create-auction.html">Create</a><a href="/app/pages/close-auction.html">Close</a><button class="wallet-trigger" type="button" data-wallet-connect>Connect wallet</button></nav></header>
      <section class="page-head"><p class="eyebrow">Function 02</p><h1>Submit a confidential bid.</h1><p class="lede">Bid value and quantity are treated as private inputs. The page does not publish a fake bid state.</p></section>
      <section class="layout">
        <form class="panel form-grid" data-action-form="Submit sealed bid">
          <label class="wide">Auction account<input required placeholder="Auction PDA or account" /></label>
          <label>Bid amount<input required type="number" min="0" step="0.01" /></label>
          <label>Quantity<input required type="number" min="1" value="1" /></label>
          <label class="wide">Private nonce<input placeholder="Optional local salt" /></label>
          <label class="wide">Bidder wallet<output data-wallet-full>Connect a wallet to continue</output></label>
          <div class="page-actions wide"><button class="action" type="submit" data-submit-action>Submit encrypted bid</button></div>
        </form>
        
      </section>
    </main>
  </body>
</html>

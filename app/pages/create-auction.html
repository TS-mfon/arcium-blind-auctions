<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Auction</title>
    <link rel="icon" href="/app/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/app/site.css" />
    <script src="/app/wallet.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a class="brand" href="/app"><span class="brand-mark">A</span><span>Create Auction</span></a>
        <nav class="nav-links"><a href="/app/how-it-works.html">How it works</a><a href="/app/pages/submit-bid.html">Bid</a><a href="/app/pages/close-auction.html">Close</a><button class="wallet-trigger" type="button" data-wallet-connect>Connect wallet</button></nav>
      </header>
      <section class="page-head"><p class="eyebrow">Function 01</p><h1>Create sealed auction terms.</h1><p class="lede">Set public auction rules. Private bids are submitted later from bidder wallets.</p></section>
      <section class="layout">
        <form class="panel form-grid" data-action-form="Create auction">
          <label>Auction title<input required placeholder="Treasury NFT sale" /></label>
          <label>Asset mint<input required placeholder="Solana mint address" /></label>
          <label>Payment mint<input required placeholder="USDC mint address" /></label>
          <label>Mode<select><option>First-price sealed bid</option><option>Vickrey second price</option><option>Uniform price</option></select></label>
          <label>Reserve floor<input required type="number" min="0" step="0.01" placeholder="10" /></label>
          <label>Supply<input required type="number" min="1" value="1" /></label>
          <label class="wide">Seller wallet<output data-wallet-full>Connect a wallet to continue</output></label>
          <div class="page-actions wide"><button class="action" type="submit" data-submit-action>Create auction</button></div>
        </form>
        
      </section>
    </main>
  </body>
</html>
